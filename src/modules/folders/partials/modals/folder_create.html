<div id="folder-create" class="modal fade">
	<u-form>
		<div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">New folder</h5>
				</div>
				<div class="modal-body">
					<u-input name="comment" label="Name" class="comment"></u-input>
					<div class="mb-3">
						<label class="form-label">Authorized users</label>
						<div class="valid-users d-flex flex-column gap-1"></div>
						<div class="form-text">Leave all unchecked for guest access</div>
					</div>
					<u-input name="refquota" label="Capacity" class="refquota">
						<span slot="suffix" class="mb-n3">GiB</span>
					</u-input>
				</div>
				<div class="modal-footer">
					<u-button variant="secondary" class="d-flex ms-auto" data-bs-dismiss="modal" outline>Cancel</u-button>
					<u-button type="submit" variant="primary">Create</u-button>
				</div>
			</div>
		</div>
	</u-form>
</div>
